<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafa Turismo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3">
            <div class="menu">
                <nav class="d-flex gap-2">
                    <a class="botao" href="#">Home</a>
                    <a class="botao" href="#">Pacotes</a>
                    <a class="botao" href="#">Sobre Nós</a>
                </nav>
            </div>

            <div class="input-group barra-busca w-auto">
                <input class="form-control" type="text" placeholder="Pesquisar...">
                <button class="btn" type="submit">Buscar</button>
            </div>
        </div>
    </header>
    <main>
        <h1 class="title">Rafa Turismo</h1>
        <section>
            <div class="row justify-content-center g-4 mt-4">
                <div  class="col-12 col-sm-auto">
                    <div class="imagem">
                        <img src="img/first.jpg" alt="">
                    </div>
                    <p>Destino 1</p>
                </div>
                <div class="col-12 col-sm-auto">
                    <div class="imagem">
                        <img src="img/second.jpg" alt="">
                    </div>
                    <p>Destino 2</p>
                </div>
                <div class="col-12 col-sm-auto">
                    <div class="imagem">
                        <img src="img/third.jpg" alt="">
                    </div>
                    <p>Destino 3</p>
                </div>
            </div>
                <div class="text-center mt-4">
                    <a href="#" class="botao botao-destaque">Conheça nossos pacotes</a>
                </div>
        </section>
    </main>
    <footer>
        <p>© 2026 Rafa Turismo | Contato: rfelipe@gmail.com</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
